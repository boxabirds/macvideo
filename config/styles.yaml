# Style filter registry for the macvideo pipeline.
#
# status:
#   accepted — approved for production; the LLM filter-chooser picks from these
#   proposed — candidate; visual review pending before acceptance
#   rejected — explicitly excluded; never used
#
# 16 filters approved on 2026-04-21 after POC 17 gallery review.

